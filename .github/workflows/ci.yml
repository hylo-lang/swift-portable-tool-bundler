name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025, macos-15]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24.x"
      - run: npm ci
        shell: bash
      - run: npx jest
        shell: bash

  check-dist:
    name: Check dist/ is up-to-date
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24.x"
      - run: npm ci
      - run: npm run pack
      - name: Verify dist/ has no uncommitted changes
        run: |
          if ! git diff --exit-code -- dist; then
            echo "::error::dist/ is out of date. Run 'npm run pack' and commit the result."
            exit 1
          fi

  audit:
    name: Audit production dependencies
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24.x"
      # Only the production dependency closure is shipped in dist/index.js,
      # so dev-only advisories are noise. Fail on high+ advisories.
      - run: npm audit --omit=dev --audit-level=high

  bundle:
    name: Bundle (${{ matrix.target }}, ${{ matrix.linking }})
    needs:
      - unit-tests
      - check-dist
    strategy:
      fail-fast: false
      # Two axes:
      #   target  — host OS / architecture combinations we support.
      #   linking — `dynamic` is the SwiftPM default; `static` adds
      #             `--static-swift-stdlib` so the Swift stdlib is
      #             linked into the executable. Static-stdlib builds
      #             still need a Foundation dylib on Linux/Windows;
      #             on macOS the Foundation framework is OS-provided.
      matrix:
        include:
          - { os: ubuntu-24.04,     target: linux-x64,     linking: dynamic }
          - { os: ubuntu-24.04,     target: linux-x64,     linking: static  }
          - { os: ubuntu-24.04-arm, target: linux-arm64,   linking: dynamic }
          - { os: ubuntu-24.04-arm, target: linux-arm64,   linking: static  }
          - { os: windows-2025,     target: windows-x64,   linking: dynamic }
          - { os: windows-2025,     target: windows-x64,   linking: static  }
          - { os: windows-11-arm,   target: windows-arm64, linking: dynamic }
          - { os: windows-11-arm,   target: windows-arm64, linking: static  }
          - { os: macos-15,         target: macos-arm64,   linking: dynamic }
          - { os: macos-15,         target: macos-arm64,   linking: static  }
          - { os: macos-15-intel,   target: macos-x64,     linking: dynamic }
          - { os: macos-15-intel,   target: macos-x64,     linking: static  }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.2"

      - name: Compute build flags
        id: flags
        shell: pwsh
        run: |
          $extra = if ('${{ matrix.linking }}' -eq 'static') { '--static-swift-stdlib' } else { '' }
          "extra=$extra" >> $env:GITHUB_OUTPUT

      - name: Build sample
        working-directory: examples/hello
        shell: pwsh
        run: swift build -c release --product hello ${{ steps.flags.outputs.extra }}

      - name: Run swift-portable-tool-bundler
        uses: ./
        with:
          products: hello
          source-directory: examples/hello
          output-directory: ${{ runner.temp }}/bundle

      - name: List bundle contents
        shell: pwsh
        run: Get-ChildItem -LiteralPath "${{ runner.temp }}/bundle" -Recurse | Select-Object FullName,Length

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: bundle-${{ matrix.target }}-${{ matrix.linking }}
          path: ${{ runner.temp }}/bundle
          if-no-files-found: error
          retention-days: 7

  verify:
    # Verifying on a fresh runner — without the Swift toolchain or any
    # other build artefacts being present — is the strongest possible
    # check that the bundle is genuinely self-contained.
    name: Verify (${{ matrix.target }}, ${{ matrix.linking }})
    needs: bundle
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-24.04,     target: linux-x64,     linking: dynamic }
          - { os: ubuntu-24.04,     target: linux-x64,     linking: static  }
          - { os: ubuntu-24.04-arm, target: linux-arm64,   linking: dynamic }
          - { os: ubuntu-24.04-arm, target: linux-arm64,   linking: static  }
          - { os: windows-2025,     target: windows-x64,   linking: dynamic }
          - { os: windows-2025,     target: windows-x64,   linking: static  }
          - { os: windows-11-arm,   target: windows-arm64, linking: dynamic }
          - { os: windows-11-arm,   target: windows-arm64, linking: static  }
          - { os: macos-15,         target: macos-arm64,   linking: dynamic }
          - { os: macos-15,         target: macos-arm64,   linking: static  }
          - { os: macos-15-intel,   target: macos-x64,     linking: dynamic }
          - { os: macos-15-intel,   target: macos-x64,     linking: static  }
    runs-on: ${{ matrix.os }}
    steps:
      - name: Download bundle artifact
        uses: actions/download-artifact@v8
        with:
          name: bundle-${{ matrix.target }}-${{ matrix.linking }}
          path: ${{ runner.temp }}/bundle

      - name: List downloaded bundle
        shell: pwsh
        run: Get-ChildItem -LiteralPath "${{ runner.temp }}/bundle" -Recurse | Select-Object FullName,Length

      - name: Run bundled executable in a toolchain-free environment (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          # Strip every variable the dynamic linker honours so a stale
          # toolchain reference cannot satisfy the binary's deps for us.
          export PATH="/usr/bin:/bin"
          unset LD_LIBRARY_PATH LD_PRELOAD LD_AUDIT
          if command -v swift >/dev/null 2>&1; then
            echo "::error::'swift' is still on PATH after sanitization"
            exit 1
          fi
          chmod +x "${RUNNER_TEMP}/bundle/hello"
          "${RUNNER_TEMP}/bundle/hello"

      - name: Run bundled executable in a toolchain-free environment (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          # Strip every variable dyld honours so a stale toolchain
          # reference cannot satisfy the binary's deps for us.
          export PATH="/usr/bin:/bin"
          unset DYLD_LIBRARY_PATH DYLD_FALLBACK_LIBRARY_PATH \
                DYLD_FRAMEWORK_PATH DYLD_FALLBACK_FRAMEWORK_PATH \
                DYLD_INSERT_LIBRARIES
          chmod +x "${RUNNER_TEMP}/bundle/hello"
          "${RUNNER_TEMP}/bundle/hello"

      - name: Run bundled executable in a Swift-free environment (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $env:PATH = "$env:SystemRoot\System32;$env:SystemRoot;$env:SystemRoot\System32\Wbem;$env:SystemRoot\System32\WindowsPowerShell\v1.0"
          $swift = Get-Command swift -ErrorAction SilentlyContinue
          if ($swift) {
            Write-Error "'swift' is still on PATH after sanitization: $($swift.Source)"
            exit 1
          }
          & "${{ runner.temp }}/bundle/hello.exe"
